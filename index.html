<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Control de Ahorros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1628;
  --bg2:#0F1E35;
  --surface:#112240;
  --surface2:#162847;
  --line:#1E3A5F;
  --accent:#2563EB;
  --accent-hover:#1D4ED8;
  --accent-soft:rgba(37,99,235,0.15);
  --ok:#10B981;
  --ok-soft:rgba(16,185,129,0.12);
  --alert:#EF4444;
  --alert-soft:rgba(239,68,68,0.12);
  --warn:#F59E0B;
  --warn-soft:rgba(245,158,11,0.12);
  --ink:#F0F6FF;
  --ink-soft:#7B96B8;
  --ink-muted:#4A6580;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.35);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;transition:all 0.15s;}
input,select,textarea{font-family:inherit;}

/* Layout */
#app{min-height:100vh;background:var(--bg);}
.page{max-width:1100px;margin:0 auto;padding:0 0 100px;}
@media(max-width:600px){.page{padding:0 0 90px;}}

/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:var(--shadow-sm);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{color:var(--ink-soft);font-size:22px;padding:6px;border-radius:8px;line-height:1;}
.back-btn:hover{background:var(--surface2);}
.topbar h1{font-size:18px;margin:0;font-family:'Inter',sans-serif;font-weight:600;}
.topbar .brand{font-family:'Fraunces',serif;font-size:19px;color:var(--accent);font-weight:700;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.15s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--line);}
.btn-secondary:hover{background:var(--line);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.btn-ghost:hover{color:var(--ink);background:var(--surface2);}
.btn-danger{background:var(--alert-soft);color:var(--alert);border:1px solid rgba(239,68,68,0.25);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-success{background:var(--ok-soft);color:var(--ok);border:1px solid rgba(16,185,129,0.25);}
.btn-block{width:100%;}
.btn:disabled{opacity:0.45;pointer-events:none;}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:8px;font-size:16px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.card-body{padding:18px;}

/* Fields */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;background:var(--surface2);color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field select option{background:var(--surface2);}

/* Screen sections */
.screen{padding:24px;}
@media(max-width:600px){.screen{padding:16px;}}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-muted);margin:20px 0 10px;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-box{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 12px;text-align:center;}
.stat-box .n{font-family:'Fraunces',serif;font-weight:700;font-size:26px;line-height:1;}
.stat-box .l{font-size:11px;color:var(--ink-soft);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;}

/* Group cards - grid on desktop */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
@media(max-width:600px){.groups-grid{grid-template-columns:1fr;}}
.group-card{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);}
.group-card:hover{border-color:var(--accent);background:var(--surface2);}
.group-icon{width:46px;height:46px;border-radius:12px;background:var(--accent-soft);border:1px solid rgba(37,99,235,0.3);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:var(--accent);font-size:17px;flex-shrink:0;}
.group-info{flex:1;min-width:0;}
.group-info .name{font-weight:600;font-size:15px;margin-bottom:2px;}
.group-info .meta{font-size:12px;color:var(--ink-soft);}

/* Badges */
.badge{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.badge-ok{background:var(--ok-soft);color:var(--ok);}
.badge-alert{background:var(--alert-soft);color:var(--alert);}
.badge-warn{background:var(--warn-soft);color:var(--warn);}

/* Client list */
.client-list{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.client-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.1s;}
.client-row:last-child{border-bottom:none;}
.client-row:hover{background:var(--surface2);}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:1px solid rgba(37,99,235,0.3);}
.client-info{flex:1;min-width:0;}
.client-info .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-info .product{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-amount{text-align:right;flex-shrink:0;}
.client-amount .val{font-weight:700;font-size:14px;}
.client-amount .lbl{font-size:11px;color:var(--ink-soft);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--ok);}
.dot-alert{background:var(--alert);}
.dot-warn{background:var(--warn);}
.dot-none{background:var(--ink-muted);}

/* FAB */
.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:25;}
.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(37,99,235,0.45);cursor:pointer;border:none;}
.fab:hover{background:var(--accent-hover);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeUp 0.2s ease;}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal-sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding:6px 20px 32px;}
@media(min-width:600px){.modal-sheet{border-radius:var(--radius);padding:24px;}}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:10px auto 14px;}
.modal-title{font-size:18px;margin:0 0 18px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Toast */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:100;box-shadow:var(--shadow);animation:fadeUp 0.2s ease;max-width:90%;text-align:center;}

/* Spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner-blue{border:2.5px solid var(--accent-soft);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}

/* Upload */
.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:28px;text-align:center;color:var(--ink-soft);background:var(--surface2);cursor:pointer;}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone .icon{font-size:28px;margin-bottom:8px;}
.preview-img{width:100%;border-radius:10px;margin-bottom:12px;max-height:260px;object-fit:contain;background:#000;}

/* Pill tabs */
.pill-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:30px;padding:4px;margin-bottom:16px;}
.pill-tabs button{flex:1;padding:8px;border-radius:24px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.pill-tabs button.active{background:var(--accent);color:#fff;}

/* History */
.history-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
.history-row:last-child{border-bottom:none;}
.history-row .hl{font-size:13.5px;}
.history-row .hd{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.history-row .hr{font-weight:700;font-size:14px;}
.history-row .del-btn{color:var(--alert);font-size:18px;padding:4px 8px;border-radius:6px;opacity:0.5;}
.history-row .del-btn:hover{opacity:1;background:var(--alert-soft);}

/* Detail info boxes */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;}
.info-box{background:var(--surface2);border-radius:10px;padding:12px;text-align:center;}
.info-box .iv{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;}
.info-box .il{font-size:11px;color:var(--ink-soft);margin-top:2px;}

/* Message box */
.msg-box{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}

/* Confirm alert box */
.confirm-alert{background:var(--warn-soft);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--warn);}

/* Login */
.login-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:32px 24px;}
.login-card{width:100%;max-width:380px;}

/* Empty state */
.empty{text-align:center;padding:50px 24px;color:var(--ink-soft);}
.empty .eicon{font-size:36px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.5;}

/* Responsive table layout for client rows on desktop */
@media(min-width:700px){
  .client-row{padding:14px 20px;}
  .client-info .name{font-size:15px;}
}

/* Utility */
.num{font-variant-numeric:tabular-nums;}
.hint{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:6px;}
.divider{height:1px;background:var(--line);margin:16px 0;}
.gap-row{display:flex;gap:10px;}
.gap-row .btn{flex:1;}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./app.js"></script>
</body>
</html>

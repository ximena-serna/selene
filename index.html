<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Control de Ahorros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F2F5;
  --surface:#FFFFFF;
  --surface2:#F0F2F5;
  --line:#E4E6EB;
  --accent:#1877F2;
  --accent-hover:#166FE5;
  --accent-soft:#E7F0FD;
  --ok:#00A854;
  --ok-soft:#E6F7EE;
  --alert:#FA3E3E;
  --alert-soft:#FEE8E8;
  --warn:#F7B928;
  --warn-soft:#FEF6E0;
  --ink:#050505;
  --ink-soft:#65676B;
  --ink-muted:#8A8D91;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.10);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;transition:all 0.15s;}
input,select,textarea{font-family:inherit;font-size:15px;}

#app{min-height:100vh;}
.page{max-width:680px;margin:0 auto;padding:12px 12px 100px;}
@media(min-width:700px){.page{padding:20px 20px 100px;}}

/* Topbar */
.topbar{background:var(--accent);padding:0 12px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(24,119,242,0.3);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{color:#fff;font-size:22px;padding:6px;border-radius:8px;opacity:0.9;}
.back-btn:hover{opacity:1;background:rgba(255,255,255,0.15);}
.topbar h1{font-size:17px;font-weight:700;color:#fff;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.topbar .brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.topbar-right{display:flex;gap:6px;align-items:center;}

/* Search bar */
.search-wrap{padding:10px 12px 6px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:56px;z-index:25;}
.search-input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--line);border-radius:20px;background:var(--bg);color:var(--ink);font-size:14px;}
.search-input:focus{outline:none;border-color:var(--accent);background:#fff;}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--ink-muted);font-size:15px;pointer-events:none;}
.search-wrap-inner{position:relative;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;cursor:pointer;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1.5px solid var(--line);}
.btn-secondary:hover{background:var(--line);}
.btn-ghost{color:var(--accent);background:transparent;font-weight:600;}
.btn-ghost:hover{background:var(--accent-soft);}
.btn-danger{background:var(--alert-soft);color:var(--alert);}
.btn-success{background:var(--ok-soft);color:var(--ok);}
.btn-white{background:#fff;color:var(--accent);font-weight:700;}
.btn-white:hover{background:#f0f2f5;}
.btn-block{width:100%;}
.btn:disabled{opacity:0.45;pointer-events:none;}
.btn-sm{padding:7px 12px;font-size:13px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--radius-sm);font-size:16px;}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);}
.card-body{padding:16px;}

/* Fields */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:var(--radius-sm);background:#fff;color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-box .n{font-weight:800;font-size:24px;line-height:1;}
.stat-box .l{font-size:11px;color:var(--ink-soft);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;}

/* Group cards */
.group-card{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:8px;}
.group-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(24,119,242,0.12);}
.group-icon{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;flex-shrink:0;}
.group-info{flex:1;min-width:0;}
.group-info .name{font-weight:700;font-size:15px;margin-bottom:1px;}
.group-info .meta{font-size:12px;color:var(--ink-soft);}

/* Badges */
.badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.badge-ok{background:var(--ok-soft);color:var(--ok);}
.badge-alert{background:var(--alert-soft);color:var(--alert);}

/* Client list */
.client-list{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);overflow:hidden;}
.client-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
.client-row:last-child{border-bottom:none;}
.client-row:hover{background:var(--bg);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-info .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-info .product{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-amount{text-align:right;flex-shrink:0;}
.client-amount .val{font-weight:700;font-size:14px;}
.client-amount .lbl{font-size:11px;color:var(--ink-soft);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--ok);}
.dot-alert{background:var(--alert);}
.dot-none{background:var(--ink-muted);}

/* FAB */
.fab-wrap{position:fixed;bottom:20px;right:16px;z-index:25;}
@media(min-width:700px){.fab-wrap{right:calc(50% - 326px);}}
.fab{width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 16px rgba(24,119,242,0.4);cursor:pointer;border:none;}
.fab:hover{background:var(--accent-hover);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeUp 0.2s ease;}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal-sheet{background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;max-height:90vh;overflow-y:auto;padding:6px 18px 28px;}
@media(min-width:600px){.modal-sheet{border-radius:var(--radius);padding:22px;}}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:10px auto 14px;}
.modal-title{font-size:17px;font-weight:700;margin:0 0 16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;z-index:100;box-shadow:var(--shadow);animation:fadeUp 0.2s ease;max-width:88%;text-align:center;}

/* Spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner-blue{border:2.5px solid var(--accent-soft);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}

/* Upload */
.upload-zone{border:2px dashed var(--line);border-radius:10px;padding:26px;text-align:center;color:var(--ink-soft);background:var(--bg);cursor:pointer;}
.upload-zone:hover{border-color:var(--accent);}
.preview-img{width:100%;border-radius:8px;margin-bottom:10px;max-height:240px;object-fit:contain;background:#000;}

/* Pill tabs */
.pill-tabs{display:flex;gap:4px;background:var(--bg);border-radius:24px;padding:3px;margin-bottom:14px;}
.pill-tabs button{flex:1;padding:8px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.pill-tabs button.active{background:var(--accent);color:#fff;}

/* History */
.history-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
.history-row:last-child{border-bottom:none;}
.history-row .hl{font-size:13.5px;font-weight:600;}
.history-row .hd{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
.history-row .hr{font-weight:700;font-size:14px;}
.del-btn{color:var(--alert);font-size:18px;padding:3px 7px;border-radius:6px;opacity:0.5;line-height:1;}
.del-btn:hover{opacity:1;background:var(--alert-soft);}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.info-box{background:var(--bg);border-radius:8px;padding:11px;text-align:center;}
.info-box .iv{font-weight:700;font-size:15px;}
.info-box .il{font-size:11px;color:var(--ink-soft);margin-top:2px;}

/* Confirm alert */
.confirm-alert{background:var(--warn-soft);border:1px solid rgba(247,185,40,0.4);border-radius:8px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:#7A5C00;}
.danger-alert{background:var(--alert-soft);border:1px solid rgba(250,62,62,0.3);border-radius:8px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:var(--alert);}

/* Message box */
.msg-box{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}

/* Login */
.login-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:24px;background:var(--accent);}
.login-card{width:100%;max-width:360px;background:#fff;border-radius:16px;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .mark{font-size:26px;font-weight:800;color:var(--accent);}
.login-logo .sub{font-size:13px;color:var(--ink-soft);margin-top:3px;}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--ink-soft);}
.empty .eicon{font-size:36px;margin-bottom:10px;}

/* Section label */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-muted);margin:16px 0 8px;}

/* Gap row */
.gap-row{display:flex;gap:8px;}
.gap-row .btn{flex:1;}
.gap-row .field{flex:1;}

/* Search results */
.search-result-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
.search-result-row:hover{background:var(--bg);}
.search-result-row:last-child{border-bottom:none;}
.search-result-group{font-size:11px;color:var(--ink-muted);margin-top:1px;}

.hint{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:5px;}
.num{font-variant-numeric:tabular-nums;}
.divider{height:1px;background:var(--line);margin:14px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./app.js"></script>
</body>
</html>

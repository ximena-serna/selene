<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Control de Ahorros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF8F5;
  --surface:#FFFFFF;
  --ink:#1C1B19;
  --ink-soft:#6B6661;
  --line:#E8E2D9;
  --accent:#B8743C;
  --accent-dark:#8F5A2C;
  --accent-soft:#F2E4D3;
  --ok:#4A7856;
  --ok-soft:#E5EEE3;
  --alert:#C2402F;
  --alert-soft:#F8E3DF;
  --radius:14px;
  --shadow:0 2px 12px rgba(28,27,25,0.06);
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;}
h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
.num{font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:90px;}
@media(min-width:540px){#app{box-shadow:var(--shadow);}}

.screen{padding:20px 18px;animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:20;}
.topbar .back{font-size:22px;color:var(--ink);padding:4px 8px;margin-left:-8px;}
.topbar h1{font-size:19px;margin:0;}
.topbar .spacer{width:30px;}

.brand{display:flex;flex-direction:column;align-items:center;gap:4px;padding:40px 0 24px;}
.brand .mark{font-family:'Fraunces',serif;font-weight:700;font-size:34px;color:var(--accent-dark);}
.brand .sub{font-size:13px;color:var(--ink-soft);letter-spacing:0.02em;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.card + .card{margin-top:12px;}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:11px;font-weight:600;font-size:15px;transition:transform 0.1s, opacity 0.15s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:var(--surface);color:var(--ink);border:1.5px solid var(--line);}
.btn-ghost{background:transparent;color:var(--accent-dark);}
.btn-block{width:100%;}
.btn-danger{background:var(--alert-soft);color:var(--alert);}
.btn:disabled{opacity:0.5;pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;background:var(--surface);color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);}

.group-card{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;}
.group-card .icon{width:46px;height:46px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:var(--accent-dark);font-size:18px;flex-shrink:0;}
.group-card .info{flex:1;min-width:0;}
.group-card .info .name{font-weight:600;font-size:15.5px;margin-bottom:2px;}
.group-card .info .meta{font-size:12.5px;color:var(--ink-soft);}
.group-card .badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}
.badge-ok{background:var(--ok-soft);color:var(--ok);}
.badge-alert{background:var(--alert-soft);color:var(--alert);}

.client-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);}
.client-row:last-child{border-bottom:none;}
.client-row .avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-soft);color:var(--accent-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.client-row .info{flex:1;min-width:0;}
.client-row .info .name{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-row .info .product{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-row .amount{text-align:right;flex-shrink:0;}
.client-row .amount .val{font-weight:700;font-size:14.5px;}
.client-row .amount .lbl{font-size:11px;color:var(--ink-soft);}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--ok);}
.dot-alert{background:var(--alert);}
.dot-none{background:#C9C2B8;}

.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:30;}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;color:var(--ink-soft);font-size:11px;font-weight:600;border-radius:10px;}
.tabbar button.active{color:var(--accent-dark);}
.tabbar svg{width:22px;height:22px;}

.fab{position:fixed;bottom:86px;left:50%;transform:translateX(50%) translateX(-50%);right:18px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(184,116,60,0.4);font-size:26px;z-index:25;}
.fab-wrap{position:fixed;bottom:86px;width:100%;max-width:480px;left:50%;transform:translateX(-50%);display:flex;justify-content:flex-end;padding:0 18px;z-index:25;pointer-events:none;}
.fab-wrap .fab{position:static;pointer-events:auto;transform:none;}

.summary-row{display:flex;gap:10px;margin-bottom:16px;}
.summary-box{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;}
.summary-box .n{font-family:'Fraunces',serif;font-weight:700;font-size:22px;}
.summary-box .l{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:600;}

.empty{text-align:center;padding:60px 24px;color:var(--ink-soft);}
.empty .icon{font-size:40px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.5;}

.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin:20px 0 10px;}
.section-title:first-child{margin-top:0;}

.modal-overlay{position:fixed;inset:0;background:rgba(28,27,25,0.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
.modal-sheet{background:var(--bg);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding:8px 18px 28px;}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:10px auto 16px;}
.modal-title{font-size:19px;margin:0 0 16px;}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:fadeIn 0.2s ease;max-width:90%;text-align:center;}

.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner-dark{border:2.5px solid rgba(184,116,60,0.25);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}

.upload-zone{border:2px dashed var(--line);border-radius:14px;padding:30px 16px;text-align:center;color:var(--ink-soft);background:var(--surface);}
.upload-zone .icon{font-size:30px;margin-bottom:8px;}
.preview-img{width:100%;border-radius:12px;border:1px solid var(--line);margin-bottom:12px;max-height:280px;object-fit:contain;background:#000;}

.confirm-box{background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:16px;}
.confirm-box .label{font-size:11.5px;font-weight:700;color:var(--accent-dark);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:4px;}
.confirm-box p{font-size:13px;color:var(--ink);margin:0;line-height:1.5;}

.history-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
.history-item:last-child{border-bottom:none;}
.history-item .l{font-size:13.5px;}
.history-item .l .d{color:var(--ink-soft);font-size:12px;}
.history-item .r{font-weight:700;font-size:14px;}

.pill-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:4px;}
.pill-tabs button{flex:1;padding:9px 10px;border-radius:24px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.pill-tabs button.active{background:var(--accent);color:#fff;}

.login-wrap{display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:32px 28px;}

.error-text{color:var(--alert);font-size:13px;margin-top:8px;}
.hint-text{color:var(--ink-soft);font-size:12.5px;margin-top:6px;line-height:1.4;}
</style>
</head>
<body>
<div id="app"></div>

<script type="module" src="./app.js"></script>
</body>
</html>
